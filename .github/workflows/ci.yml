name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint (ruff)
        run: ruff check src/

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports --no-strict-optional

  import-check:
    name: Import check (headless)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check all modules import cleanly
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -c "from src.models.project import Project, ImageAnnotation, Point"
          python -c "from src.core.point_generator import generate_points"
          python -c "from src.core.statistics import image_coverage, project_summary"
          python -c "from src.core.exporter import export_csv, export_excel"
          python -c "from src.core.importer import import_cpce_excel, import_cpce_cpc"

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [lint, import-check]

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: coralX-linux
            ext: ""
            add_data: "data:data"
          - os: windows-latest
            artifact: coralX-windows
            ext: ".exe"
            add_data: "data;data"
          - os: macos-latest
            artifact: coralX-macos
            ext: ""
            add_data: "data:data"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 libgl1

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: >
          pyinstaller
          --onefile
          --windowed
          --name coralX
          --add-data "${{ matrix.add_data }}"
          src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/coralX${{ matrix.ext }}
          retention-days: 7
